<GridLayout rows="auto,auto,*" class="h-full supplementary-bg">
  <!-- Header -->
  <StackLayout row="0" class="px-5 pt-5 pb-3">
    <GridLayout columns="auto,*,auto">
      <Label col="0" text="🌍" class="text-2xl"></Label>
      <StackLayout col="1" class="ml-3">
        <Label text="Tracker" class="text-xl font-bold text-white"></Label>
        <Label text="Updates" class="text-xs text-[#64b5f6] mt-1"></Label>
      </StackLayout>
      <GridLayout rows="*,auto,*" col="2" class="bg-[#4caf50] rounded-full px-3 py-1 items-center justify-center h-12" (loaded)="startLiveIndicatorAnimation($event)">
        <Label row="1" text="● LIVE" class="text-xs text-white font-bold"></Label>
      </GridLayout>
    </GridLayout>
  </StackLayout>

  <!-- Progress Bar -->
  <StackLayout row="1" class="px-5 pb-4">
    <GridLayout columns="*,auto" class="mb-2">
      <Label col="0" text="Global Progress" class="text-xs text-[#90caf9]"></Label>
      <Label col="1" [text]="globalProgress() + '%'" class="text-xs font-bold text-[#4caf50]"></Label>
    </GridLayout>
    <GridLayout class="h-3 rounded-full progress-bar-bg">
      <StackLayout class="h-3 rounded-full progress-bar-fill" [width]="globalProgress() + '%'" horizontalAlignment="left"></StackLayout>
    </GridLayout>
    <GridLayout columns="*,*,*" class="mt-3">
      <StackLayout col="0" class="items-center">
        <Label [text]="totalDelivered()" class="text-lg font-bold text-[#4caf50]"></Label>
        <Label text="Delivered" class="text-[10px] text-[#64b5f6]"></Label>
      </StackLayout>
      <StackLayout col="1" class="items-center">
        <Label [text]="totalPending()" class="text-lg font-bold text-[#ffc107]"></Label>
        <Label text="Pending" class="text-[10px] text-[#64b5f6]"></Label>
      </StackLayout>
      <StackLayout col="2" class="items-center">
        <Label text="🦌 9" class="text-lg font-bold text-white"></Label>
        <Label text="Reindeer" class="text-[10px] text-[#64b5f6]"></Label>
      </StackLayout>
    </GridLayout>
  </StackLayout>

  <!-- Countries List with Sticky Headers -->
  <ScrollView row="2">
    <StackLayout class="pb-5">
      <ng-container *ngFor="let country of countries()">
        <!-- Sticky-style Country Header -->
        <GridLayout columns="auto,*,auto,auto" class="px-5 py-3 country-header border-t border-b border-[#2a4a6c] mb-2 mt-1">
          <Label col="0" [text]="country.flag" class="text-xl"></Label>
          <Label col="1" [text]="country.title" class="text-xs font-bold text-white ml-2"></Label>
          <StackLayout col="2" class="progress-badge rounded-full px-2 py-1 mr-2">
            <Label [text]="country.progress + '%'" class="text-xs text-[#4caf50] font-semibold"></Label>
          </StackLayout>
          <Label col="3" [text]="getDeliveredCount(country) + '/' + country.items.length" class="text-xs text-[#64b5f6]"></Label>
        </GridLayout>

        <!-- Cities in this country -->
        <ng-container *ngFor="let city of country.items">
          <GridLayout
            columns="auto,*,auto"
            class="px-4 py-3 mx-4 my-2 rounded-xl border"
            [ngClass]="{
              'city-delivered': city.delivered,
              'city-pending': !city.delivered
            }"
            (tap)="toggleDelivery(country, city)"
          >
            <!-- Status Icon -->
            <GridLayout col="0" rows="*,auto,*" class="w-10 h-10 rounded-full items-center justify-center" [ngClass]="{'status-icon-delivered': city.delivered, 'status-icon-pending': !city.delivered}" iosSafeAreaOverFlow="false">
              <Label row="1" [text]="city.delivered ? '✅' : '📦'" class="text-center"></Label>
            </GridLayout>

            <!-- City Info -->
            <StackLayout col="1" class="ml-2">
              <Label [text]="city.name" class="text-sm font-medium text-white"></Label>
              <GridLayout columns="auto,auto" class="mt-2">
                <Label col="0" [text]="'🎁 ' + city.presentsCount" class="text-xs text-[#90caf9]"></Label>
                <Label *ngIf="city.delivered && city.time" col="1" [text]="'• ' + city.time" class="text-xs text-[#4caf50] ml-2"></Label>
              </GridLayout>
            </StackLayout>

            <!-- Action -->
            <StackLayout col="2" class="items-center justify-center">
              <Label *ngIf="city.delivered" text="🎅" class="text-xl"></Label>
              <StackLayout *ngIf="!city.delivered" class="bg-[#c41e3a] rounded-lg px-3 py-1">
                <Label text="Deliver" class="text-xs text-white font-semibold"></Label>
              </StackLayout>
            </StackLayout>
          </GridLayout>
        </ng-container>
      </ng-container>

      <!-- Santa's Current Location -->
      <StackLayout class="mx-4 mt-4 rounded-2xl bg-[#c41e3a] p-4">
        <GridLayout columns="auto,*">
          <Label col="0" text="🛷" class="text-2xl"></Label>
          <StackLayout col="1" class="ml-3">
            <Label text="Santa's Current Location" class="text-xs text-[#ffb3b3]"></Label>
            <Label text="Flying over the Atlantic Ocean" class="text-sm font-bold text-white mt-1"></Label>
            <Label text="Next stop: New York City 🗽" class="text-xs text-[#ffd700] mt-1"></Label>
          </StackLayout>
        </GridLayout>
      </StackLayout>

      <!-- Fun Stats -->
      <StackLayout class="mx-4 mt-4 rounded-2xl cookie-counter-card p-4 border border-[#2a4a6c]">
        <Label text="🍪 Cookie Counter" class="text-xs text-[#64b5f6] font-semibold"></Label>
        <GridLayout columns="*,*" class="mt-2">
          <StackLayout col="0">
            <Label text="2,847,293" class="text-lg font-bold text-[#ffc107]"></Label>
            <Label text="Cookies eaten" class="text-xs text-[#90caf9]"></Label>
          </StackLayout>
          <StackLayout col="1">
            <Label text="1,423,646" class="text-lg font-bold text-white"></Label>
            <Label text="Glasses of milk" class="text-xs text-[#90caf9]"></Label>
          </StackLayout>
        </GridLayout>
      </StackLayout>
    </StackLayout>
  </ScrollView>
</GridLayout>
